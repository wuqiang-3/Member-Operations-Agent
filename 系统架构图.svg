<svg viewBox="0 0 680 540" width="100%" role="img">
  <title>会员运营智能体系统架构图</title>
  <desc>五层架构：数据源层、数据集成层、AI核心层、应用能力层、前端交互层</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Layer 5: 前端交互层 -->
  <g>
    <rect x="40" y="30" width="600" height="72" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="68" y="50" font-size="14" font-weight="500" fill="#085041">前端交互层</text>
    <text class="ts" x="68" y="68" font-size="12" fill="#5F5E5A">用户交互与结果展示</text>
    <!-- sub boxes -->
    <rect x="260" y="40" width="100" height="44" rx="8" fill="#ffffff" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="310" y="62" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">智能对话</text>
    <rect x="370" y="40" width="100" height="44" rx="8" fill="#ffffff" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="420" y="62" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">策略看板</text>
    <rect x="480" y="40" width="100" height="44" rx="8" fill="#ffffff" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="530" y="62" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">配置后台</text>
    <rect x="590" y="40" width="40" height="44" rx="8" fill="#ffffff" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="610" y="62" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041">API</text>
  </g>

  <!-- Arrow: 5→4 -->
  <line x1="340" y1="102" x2="340" y2="128" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" class="arr"/>

  <!-- Layer 4: 应用能力层 -->
  <g>
    <rect x="40" y="128" width="600" height="72" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="th" x="68" y="148" font-size="14" font-weight="500" fill="#3C3489">应用能力层</text>
    <text class="ts" x="68" y="166" font-size="12" fill="#5F5E5A">业务功能封装</text>
    <rect x="260" y="138" width="100" height="44" rx="8" fill="#ffffff" stroke="#534AB7" stroke-width="0.5"/>
    <text x="310" y="160" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">分层策略</text>
    <rect x="370" y="138" width="100" height="44" rx="8" fill="#ffffff" stroke="#534AB7" stroke-width="0.5"/>
    <text x="420" y="160" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">文案生成</text>
    <rect x="480" y="138" width="100" height="44" rx="8" fill="#ffffff" stroke="#534AB7" stroke-width="0.5"/>
    <text x="530" y="160" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">效果预测</text>
    <rect x="590" y="138" width="40" height="44" rx="8" fill="#ffffff" stroke="#534AB7" stroke-width="0.5"/>
    <text x="610" y="160" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3C3489">执行</text>
  </g>

  <!-- Arrow: 4→3 -->
  <line x1="340" y1="200" x2="340" y2="228" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" class="arr"/>

  <!-- Layer 3: AI 核心层 (largest, highlighted) -->
  <g>
    <rect x="40" y="228" width="600" height="108" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
    <text class="th" x="68" y="252" font-size="15" font-weight="500" fill="#0C447C">AI 核心层</text>
    <text class="ts" x="68" y="270" font-size="12" fill="#5F5E5A">智能决策与推理引擎</text>

    <!-- DeepSeek -->
    <rect x="180" y="244" width="140" height="56" rx="8" fill="#ffffff" stroke="#185FA5" stroke-width="0.5"/>
    <text x="250" y="264" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#0C447C">DeepSeek V3</text>
    <text x="250" y="282" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">LLM 推理引擎</text>

    <!-- LangGraph -->
    <rect x="330" y="244" width="140" height="56" rx="8" fill="#ffffff" stroke="#185FA5" stroke-width="0.5"/>
    <text x="400" y="264" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#0C447C">LangGraph</text>
    <text x="400" y="282" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">Agent 编排框架</text>

    <!-- Milvus -->
    <rect x="480" y="244" width="140" height="56" rx="8" fill="#ffffff" stroke="#185FA5" stroke-width="0.5"/>
    <text x="550" y="264" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#0C447C">Milvus</text>
    <text x="550" y="282" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">向量数据库</text>

    <!-- Prompt -->
    <rect x="180" y="310" width="300" height="18" rx="4" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.3"/>
    <text x="330" y="320" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0C447C">Prompt 工程 + Few-shot + 结构化输出</text>
  </g>

  <!-- Arrow: 3→2 -->
  <line x1="340" y1="336" x2="340" y2="365" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" class="arr"/>

  <!-- Layer 2: 数据集成层 -->
  <g>
    <rect x="40" y="365" width="600" height="72" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="th" x="68" y="385" font-size="14" font-weight="500" fill="#633806">数据集成层</text>
    <text class="ts" x="68" y="403" font-size="12" fill="#5F5E5A">统一数据接入与标准化</text>
    <rect x="260" y="375" width="100" height="44" rx="8" fill="#ffffff" stroke="#BA7517" stroke-width="0.5"/>
    <text x="310" y="397" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">API适配器</text>
    <rect x="370" y="375" width="100" height="44" rx="8" fill="#ffffff" stroke="#BA7517" stroke-width="0.5"/>
    <text x="420" y="397" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">DB连接器</text>
    <rect x="480" y="375" width="80" height="44" rx="8" fill="#ffffff" stroke="#BA7517" stroke-width="0.5"/>
    <text x="520" y="397" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">ETL</text>
    <rect x="568" y="375" width="64" height="44" rx="8" fill="#ffffff" stroke="#BA7517" stroke-width="0.5"/>
    <text x="600" y="397" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#633806">特征</text>
  </g>

  <!-- Arrow: 2→1 -->
  <line x1="340" y1="437" x2="340" y2="465" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" class="arr"/>

  <!-- Layer 1: 数据源层 -->
  <g>
    <rect x="40" y="465" width="600" height="68" rx="12" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
    <text class="th" x="68" y="485" font-size="14" font-weight="500" fill="#791F1F">数据源层</text>
    <text class="ts" x="68" y="503" font-size="12" fill="#5F5E5A">接入多品牌中台数据</text>
    <rect x="220" y="477" width="88" height="40" rx="8" fill="#ffffff" stroke="#A32D2D" stroke-width="0.5"/>
    <text x="264" y="497" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#791F1F">南讯ECRP</text>
    <rect x="316" y="477" width="88" height="40" rx="8" fill="#ffffff" stroke="#A32D2D" stroke-width="0.5"/>
    <text x="360" y="497" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#791F1F">数云CDP</text>
    <rect x="412" y="477" width="88" height="40" rx="8" fill="#ffffff" stroke="#A32D2D" stroke-width="0.5"/>
    <text x="456" y="497" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#791F1F">企微SCRM</text>
    <rect x="508" y="477" width="100" height="40" rx="8" fill="#ffffff" stroke="#A32D2D" stroke-width="0.5"/>
    <text x="558" y="497" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#791F1F">电商平台</text>
  </g>
</svg>
