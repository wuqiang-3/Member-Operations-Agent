<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会员运营智能体 — 原型设计 v2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0F1A2E; --steel: #1D2D44; --slate: #2A3F5A;
    --blue: #3B82F6; --blue-bright: #60A5FA; --amber: #F59E0B;
    --teal: #14B8A6; --green: #22C55E; --rose: #F43F5E;
    --text: #F1F5F9; --text2: #94A3B8; --text3: #64748B;
    --border: #334155; --card: #1E293B;
    --radius: 12px; --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif; background: var(--navy);
    color: var(--text); display: flex; height: 100vh; overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 240px; background: var(--steel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 24px 0; flex-shrink: 0;
  }
  .sidebar-logo { padding: 0 20px 24px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .sidebar-logo .icon { font-size: 24px; }
  .sidebar-logo h1 { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; margin-top: 8px; }
  .sidebar-logo p { font-size: 11px; color: var(--text3); margin-top: 4px; }

  .nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); padding: 8px 12px 4px; font-weight: 600; }
  .chat-history { flex: 1; overflow-y: auto; padding: 4px 8px; }
  .history-item {
    padding: 10px 12px; border-radius: var(--radius-sm); font-size: 12px;
    color: var(--text2); cursor: pointer; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: all 0.15s;
  }
  .history-item:hover { background: var(--slate); color: var(--text); }
  .history-item.active { background: rgba(59,130,246,0.15); color: var(--blue-bright); }

  .nav-footer { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--border); }
  .nav-footer .user { display: flex; align-items: center; gap: 10px; }
  .nav-footer .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
  .nav-footer .name { font-size: 12px; color: var(--text); }
  .nav-footer .role { font-size: 10px; color: var(--text3); }

  /* Main chat area */
  .main { flex: 1; display: flex; flex-direction: column; }

  .topbar {
    height: 56px; background: var(--steel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 28px;
  }
  .topbar .title { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; }
  .topbar .subtitle { font-size: 11px; color: var(--text3); margin-left: 12px; }

  .chat-area { flex: 1; overflow-y: auto; padding: 28px 28px 0; display: flex; flex-direction: column; gap: 20px; }

  /* Welcome state */
  .welcome { text-align: center; padding: 40px 0 20px; }
  .welcome h2 { font-family: 'DM Sans', sans-serif; font-size: 22px; margin-bottom: 8px; }
  .welcome p { color: var(--text2); font-size: 13px; margin-bottom: 28px; }
  .suggestion-chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 680px; margin: 0 auto; }
  .suggestion-chip {
    padding: 10px 18px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card); color: var(--text2); font-size: 12px;
    cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans SC', sans-serif;
    white-space: nowrap;
  }
  .suggestion-chip:hover { border-color: var(--blue); color: var(--blue-bright); background: rgba(59,130,246,0.08); }

  /* Messages */
  .message { display: flex; gap: 14px; max-width: 820px; animation: msgIn 0.35s ease; }
  @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; margin-top: 2px; }
  .msg-user .msg-avatar { background: var(--blue); }
  .msg-agent .msg-avatar { background: var(--teal); }
  .msg-bubble {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px; font-size: 13px;
    line-height: 1.7; flex: 1;
  }
  .msg-user .msg-bubble { background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.25); }

  /* Agent thought process */
  .thought-block {
    background: var(--steel); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 12px;
    font-size: 12px; color: var(--text2);
  }
  .thought-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 600; color: var(--amber);
    margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .thought-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); }
  .param-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .param-item { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); }
  .param-item .key { color: var(--text3); margin-right: 6px; }
  .param-item .val { color: var(--blue-bright); }

  /* Execution flow */
  .exec-flow { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
  .exec-step {
    display: flex; align-items: center; gap: 10px; padding: 8px 12px;
    border-radius: 6px; font-size: 12px;
  }
  .exec-step .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .exec-step .dot.done { background: var(--green); }
  .exec-step .dot.running { background: var(--blue); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .exec-step .step-label { color: var(--text2); }
  .exec-step.completed .step-label { color: var(--text); }
  .exec-step .step-time { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); }

  /* Result cards in message */
  .result-section { margin-top: 16px; }
  .result-section h4 { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text); }
  .seg-card {
    background: var(--steel); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 14px 16px; margin-bottom: 8px; border-left: 3px solid var(--blue);
    font-size: 12px; line-height: 1.6;
  }
  .seg-card .seg-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .seg-card .seg-name { font-weight: 600; font-size: 13px; }
  .seg-card .seg-stats { color: var(--text3); font-size: 11px; }
  .seg-card .seg-desc { color: var(--text2); }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; margin: 2px; }
  .tag-ch { background: rgba(59,130,246,0.2); color: var(--blue-bright); }
  .tag-of { background: rgba(245,158,11,0.2); color: var(--amber); }

  .copy-card {
    background: var(--steel); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 14px 16px; margin-bottom: 8px;
  }
  .copy-card.rec { border: 1.5px solid var(--teal); position: relative; }
  .copy-card.rec::after { content:'⭐ 推荐'; position:absolute; top:-10px; right:14px; background:var(--teal); color:#000; font-size:10px; font-weight:600; padding:3px 10px; border-radius:10px; }
  .copy-card .copy-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); margin-bottom: 6px; }
  .copy-card .copy-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .copy-card .copy-body { font-size: 12px; color: var(--text2); line-height: 1.7; margin-bottom: 8px; }
  .copy-card .copy-meta { display: flex; gap: 16px; font-size: 11px; }
  .copy-card .copy-meta .conv { color: var(--green); font-weight: 600; }

  .metric-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .metric-box {
    background: var(--steel); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 14px; text-align: center;
  }
  .metric-box .mv { font-family: 'DM Sans', sans-serif; font-size: 24px; font-weight: 700; }
  .metric-box .ml { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .alert { border-radius: var(--radius-sm); padding: 12px 16px; font-size: 12px; display: flex; align-items: flex-start; gap: 8px; margin-top: 12px; line-height: 1.6; }
  .alert-warn { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); color: var(--amber); }
  .alert-info { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); color: var(--blue-bright); }

  .confirm-bar {
    display: flex; gap: 8px; margin-top: 16px; align-items: center;
  }
  .btn {
    padding: 8px 18px; border-radius: var(--radius-sm); font-size: 12px;
    font-weight: 500; cursor: pointer; border: none; font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover { background: #2563EB; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--text3); color: var(--text); }
  .btn-sm { padding: 5px 12px; font-size: 11px; }

  /* Input area */
  .input-area {
    padding: 16px 28px 20px; border-top: 1px solid var(--border);
    background: var(--steel);
  }
  .input-wrapper {
    display: flex; gap: 10px; align-items: center;
    max-width: 820px; margin: 0 auto;
  }
  .input-field {
    flex: 1; padding: 12px 18px; border-radius: var(--radius);
    background: var(--navy); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; font-family: 'Noto Sans SC', sans-serif;
    outline: none; transition: border-color 0.15s; line-height: 1.5;
    resize: none; min-height: 44px; max-height: 120px;
  }
  .input-field:focus { border-color: var(--blue); }
  .input-field::placeholder { color: var(--text3); }
  .send-btn {
    width: 44px; height: 44px; border-radius: 50%; background: var(--blue);
    border: none; cursor: pointer; font-size: 18px; display: flex;
    align-items: center; justify-content: center; transition: all 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #2563EB; transform: scale(1.05); }

  .proto-badge {
    position: fixed; top: 12px; right: 12px; background: var(--amber);
    color: #000; font-size: 10px; font-weight: 700; padding: 4px 10px;
    border-radius: 12px; z-index: 100;
  }

  .scene-hint {
    color: var(--text3); font-size: 11px; margin-bottom: 8px; display:flex; align-items:center; gap:6px;
  }
  .scene-hint::before { content:''; width:4px; height:4px; border-radius:50%; background:var(--blue); }
</style>
</head>
<body>

<div class="proto-badge">v2 · 自然语言交互</div>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="icon">🤖</div>
    <h1>会员运营智能体</h1>

    <div class="user">

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea class="input-field" id="user-input" placeholder="例如：帮我给百丽品牌做会员分层，分析近90天数据..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>

<script>

  `,

// =========== CHAT LOGIC ===========
let messages = [];

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'message msg-user';
  div.innerHTML = `<div class="msg-avatar">强</div><div class="msg-bubble">${escapeHtml(text)}</div>`;
  document.getElementById('chat-area').appendChild(div);
  messages.push({role:'user',text});
  addHistory(text.substring(0,25)+'…');
}

function addAgentMessage(html) {
  const div = document.createElement('div');
  div.className = 'message msg-agent';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-bubble">${html}</div>`;
  document.getElementById('chat-area').appendChild(div);
  messages.push({role:'agent',html});
}

function addHistory(label) {
  const hist = document.getElementById('chat-history');
  const item = document.createElement('div');
  item.className = 'history-item';
  item.textContent = label;
  hist.prepend(item);
}

function detectScenario(text) {
  if (text.includes('分层') || text.includes('分类') || text.includes('聚类')) return 'segmentation';
  if (text.includes('文案') || text.includes('推送') || text.includes('触达') || text.includes('生成')) return 'copywriting';
  if (text.includes('预测') || text.includes('预估') || text.includes('效果') || text.includes('ROI')) return 'prediction';
  return 'segmentation';
}

function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  addUserMessage(text);

  const scenario = detectScenario(text);
  const result = scenarioResults[scenario];

  setTimeout(() => {
    addAgentMessage(result);
  }, 600);

  // scroll
  setTimeout(() => {
    document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;
  }, 800);
}

function sendSuggestion(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Auto-resize textarea
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
