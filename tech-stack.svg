<svg viewBox="0 0 680 440" width="100%" role="img">
  <title>技术选型方案对比表</title>
  <desc>会员运营智能体项目各层级技术选型对比，推荐方案与替代方案</desc>

  <!-- Header -->
  <rect x="40" y="20" width="600" height="32" rx="8" fill="#0C447C"/>
  <text x="100" y="36" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#ffffff">技术层级</text>
  <text x="260" y="36" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#ffffff">推荐方案</text>
  <text x="420" y="36" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#ffffff">替代方案</text>
  <text x="570" y="36" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#ffffff">核心理由</text>

  <!-- Row 1: LLM 底座 -->
  <rect x="40" y="56" width="600" height="36" rx="0" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.3"/>
  <text x="100" y="74" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C" font-weight="500">LLM 底座</text>
  <rect x="190" y="62" width="120" height="24" rx="6" fill="#378ADD"/>
  <text x="250" y="74" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#ffffff">DeepSeek V3</text>
  <text x="420" y="74" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">GPT-4o / Claude 3.5</text>
  <text x="570" y="74" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">中文强+成本低</text>

  <!-- Row 2: Agent 框架 -->
  <rect x="40" y="96" width="600" height="36" rx="0" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.3"/>
  <text x="100" y="114" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489" font-weight="500">Agent 框架</text>
  <rect x="190" y="102" width="120" height="24" rx="6" fill="#534AB7"/>
  <text x="250" y="114" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#ffffff">LangGraph</text>
  <text x="420" y="114" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">AutoGen / CrewAI</text>
  <text x="570" y="114" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">状态管理+中断恢复</text>

  <!-- Row 3: 向量数据库 -->
  <rect x="40" y="136" width="600" height="36" rx="0" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.3"/>
  <text x="100" y="154" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041" font-weight="500">向量数据库</text>
  <rect x="190" y="142" width="120" height="24" rx="6" fill="#0F6E56"/>
  <text x="250" y="154" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#ffffff">Milvus</text>
  <text x="420" y="154" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">Chroma / Weaviate</text>
  <text x="570" y="154" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">企业级+云原生</text>

  <!-- Row 4: 后端框架 -->
  <rect x="40" y="176" width="600" height="36" rx="0" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.3"/>
  <text x="100" y="194" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806" font-weight="500">后端框架</text>
  <rect x="190" y="182" width="120" height="24" rx="6" fill="#BA7517"/>
  <text x="250" y="194" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#ffffff">FastAPI</text>
  <text x="420" y="194" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">Spring Boot / Node.js</text>
  <text x="570" y="194" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">Python生态+异步</text>

  <!-- Row 5: 前端框架 -->
  <rect x="40" y="216" width="600" height="36" rx="0" fill="#FBEAF0" stroke="#ED93B1" stroke-width="0.3"/>
  <text x="100" y="234" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#72243E" font-weight="500">前端框架</text>
  <rect x="190" y="222" width="120" height="24" rx="6" fill="#993556"/>
  <text x="250" y="234" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#ffffff">React+AntD Pro</text>
  <text x="420" y="234" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">Vue+Element Plus</text>
  <text x="570" y="234" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">企业级UI组件</text>

  <!-- Row 6: 数据管道 -->
  <rect x="40" y="256" width="600" height="36" rx="0" fill="#EAF3DE" stroke="#97C459" stroke-width="0.3"/>
  <text x="100" y="274" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#27500A" font-weight="500">数据管道</text>
  <rect x="190" y="262" width="120" height="24" rx="6" fill="#3B6D11"/>
  <text x="250" y="274" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#ffffff">Flink+Airflow</text>
  <text x="420" y="274" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">Spark + dbt</text>
  <text x="570" y="274" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">实时+批处理</text>

  <!-- Row 7: 数据存储 -->
  <rect x="40" y="296" width="600" height="36" rx="0" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.3"/>
  <text x="100" y="314" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441" font-weight="500">数据存储</text>
  <rect x="190" y="302" width="140" height="24" rx="6" fill="#5F5E5A"/>
  <text x="260" y="314" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#ffffff">PG+Redis+MinIO</text>
  <text x="420" y="314" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">MySQL + MongoDB</text>
  <text x="570" y="314" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">关系+缓存+对象</text>

  <!-- Row 8: 部署方式 -->
  <rect x="40" y="336" width="600" height="36" rx="0" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.3"/>
  <text x="100" y="354" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C" font-weight="500">部署方式</text>
  <rect x="190" y="342" width="120" height="24" rx="6" fill="#378ADD"/>
  <text x="250" y="354" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#ffffff">K8s+Docker</text>
  <text x="420" y="354" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">单机 / 私有化</text>
  <text x="570" y="354" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">弹性伸缩+隔离</text>

  <!-- Row 9: 监控运维 -->
  <rect x="40" y="376" width="600" height="36" rx="0" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.3"/>
  <text x="100" y="394" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489" font-weight="500">监控运维</text>
  <rect x="190" y="382" width="140" height="24" rx="6" fill="#534AB7"/>
  <text x="260" y="394" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#ffffff">LangSmith+Prom</text>
  <text x="420" y="394" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">Grafana + ELK</text>
  <text x="570" y="394" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780">观测+评测+监控</text>

  <!-- Divider lines -->
  <line x1="180" y1="20" x2="180" y2="412" stroke="#D3D1C7" stroke-width="0.3"/>
  <line x1="340" y1="20" x2="340" y2="412" stroke="#D3D1C7" stroke-width="0.3"/>
  <line x1="490" y1="20" x2="490" y2="412" stroke="#D3D1C7" stroke-width="0.3"/>

  <!-- Border -->
  <rect x="40" y="20" width="600" height="392" rx="8" fill="none" stroke="#888780" stroke-width="0.5"/>
</svg>
